basePath: /
definitions:
  auth.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  auth.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  employee.CreateEmployeeRequest:
    properties:
      birthday:
        description: 'format: 2006-01-02'
        type: string
      email:
        type: string
      full_name:
        type: string
      gender_id:
        type: integer
      phone_number:
        type: string
      photo:
        type: string
      team_id:
        type: integer
    required:
    - birthday
    - email
    - full_name
    - gender_id
    - team_id
    type: object
  employee.EmployeeResponse:
    properties:
      birthday:
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        $ref: '#/definitions/employee.Gender'
      id:
        type: integer
      phone_number:
        type: string
      photo:
        type: string
      team:
        $ref: '#/definitions/employee.Team'
      user_id:
        type: integer
    type: object
  employee.Gender:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  employee.Team:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  employee.UpdateEmployeeRequest:
    properties:
      birthday:
        description: 'format: 2006-01-02'
        type: string
      email:
        type: string
      full_name:
        type: string
      gender_id:
        type: integer
      phone_number:
        type: string
      photo:
        type: string
      team_id:
        type: integer
    type: object
host: 192.168.100.22:8080
info:
  contact: {}
  description: AI Task Team Manager API is a backend service designed to manage team
    tasks using artificial intelligence.
  title: AI Task Team Manager API
  version: "1.0"
paths:
  /auth/account:
    delete:
      description: Delete the authenticated user's account
      produces:
      - application/json
      responses:
        "200":
          description: account deleted
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete user account
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset email
      parameters:
      - description: Forgot password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
      summary: Forgot password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token response
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: invalid credentials
          schema:
            type: string
      summary: Login user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: created
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "409":
          description: email already exists
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Register user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password using token from email
      parameters:
      - description: Reset password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: password reset successfully
          schema:
            type: string
        "400":
          description: invalid or expired token
          schema:
            type: string
      summary: Reset password
      tags:
      - Auth
  /auth/verify-email:
    get:
      description: Verify user email using the token sent to their inbox
      parameters:
      - description: Verification token
        in: query
        name: token
        required: true
        type: string
      responses:
        "200":
          description: email verified
          schema:
            type: string
        "400":
          description: invalid or expired token
          schema:
            type: string
      summary: Verify email address
      tags:
      - Auth
  /employees:
    delete:
      description: Delete an employee
      responses:
        "200":
          description: deleted
          schema:
            type: string
        "400":
          description: invalid id
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete employee
      tags:
      - Employee
    get:
      description: Get list of all employees
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/employee.EmployeeResponse'
            type: array
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get all employees
      tags:
      - Employee
    post:
      consumes:
      - application/json
      description: Create a new employee
      parameters:
      - description: Create employee request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/employee.CreateEmployeeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: created
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create employee
      tags:
      - Employee
    put:
      consumes:
      - application/json
      description: Update an employee
      parameters:
      - description: Update employee request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/employee.UpdateEmployeeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: updated
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update employee
      tags:
      - Employee
  /employees/me:
    get:
      description: Get employee
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/employee.EmployeeResponse'
        "400":
          description: invalid id
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get employee
      tags:
      - Employee
securityDefinitions:
  BearerAuth:
    description: Enter the token with the `Bearer ` prefix, e.g. "Bearer abcde12345".
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
