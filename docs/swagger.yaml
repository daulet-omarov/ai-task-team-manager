basePath: /
definitions:
  auth.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  auth.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  board.BoardResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      isOwner:
        type: boolean
      memberCount:
        type: integer
      name:
        type: string
      ownerId:
        type: integer
    type: object
  board.CreateBoardRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  board.DashboardResponse:
    properties:
      boards:
        items:
          $ref: '#/definitions/board.BoardResponse'
        type: array
      isFirstLogin:
        type: boolean
    type: object
  board.MemberResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      photo:
        type: string
      role:
        type: string
      user_id:
        type: integer
    type: object
  employee.EmployeeResponse:
    properties:
      birthday:
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        $ref: '#/definitions/models.Gender'
      id:
        type: integer
      phone_number:
        type: string
      photo:
        type: string
      user_id:
        type: integer
    type: object
  invite.CreateInviteRequest:
    properties:
      user_id:
        type: integer
    required:
    - user_id
    type: object
  invite.InviteResponse:
    properties:
      board_id:
        type: integer
      board_name:
        type: string
      created_at:
        type: string
      id:
        type: integer
      invitee_id:
        type: integer
      inviter_id:
        type: integer
      status:
        type: string
    type: object
  models.Gender:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  task.CreateTaskRequest:
    properties:
      assignee_id:
        description: employee ID
        type: integer
      description:
        type: string
      priority_id:
        type: integer
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - title
    type: object
  task.TaskResponse:
    properties:
      assignee_id:
        type: integer
      board_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      priority_id:
        type: integer
      reporter_id:
        type: integer
      status_id:
        type: integer
      time_spent:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  task.UpdateTaskRequest:
    properties:
      assignee_id:
        description: employee ID
        type: integer
      description:
        type: string
      priority_id:
        type: integer
      status_id:
        type: integer
      time_spent:
        type: integer
      title:
        type: string
    type: object
host: 192.168.100.32:8080
info:
  contact: {}
  description: AI Task Team Manager API is a backend service designed to manage team
    tasks using artificial intelligence.
  title: AI Task Team Manager API
  version: "1.0"
paths:
  /auth/account:
    delete:
      description: Delete the authenticated user's account
      produces:
      - application/json
      responses:
        "200":
          description: account deleted
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete user account
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset email
      parameters:
      - description: Forgot password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
      summary: Forgot password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token response
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: bad request
          schema:
            type: string
        "401":
          description: invalid credentials
          schema:
            type: string
      summary: Login user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: created
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "409":
          description: email already exists
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Register user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password using token from email
      parameters:
      - description: Reset password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: password reset successfully
          schema:
            type: string
        "400":
          description: invalid or expired token
          schema:
            type: string
      summary: Reset password
      tags:
      - Auth
  /auth/verify-email:
    get:
      description: Verify user email using the token sent to their inbox
      parameters:
      - description: Verification token
        in: query
        name: token
        required: true
        type: string
      responses:
        "200":
          description: email verified
          schema:
            type: string
        "400":
          description: invalid or expired token
          schema:
            type: string
      summary: Verify email address
      tags:
      - Auth
  /boards:
    post:
      consumes:
      - application/json
      description: Create a new board; the caller becomes the owner
      parameters:
      - description: Create board request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/board.CreateBoardRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/board.BoardResponse'
        "400":
          description: bad request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create board
      tags:
      - Board
  /boards/{boardId}/invite:
    post:
      consumes:
      - application/json
      description: Board owner invites a user to the board
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: integer
      - description: Invite request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/invite.CreateInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: invitation sent
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "403":
          description: only the board owner can send invitations
          schema:
            type: string
        "409":
          description: already a member / invitation already pending
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Send invitation
      tags:
      - Invite
  /boards/{boardId}/tasks:
    get:
      description: Returns all tasks for a board; caller must be a member
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/task.TaskResponse'
            type: array
        "403":
          description: access denied
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get board tasks
      tags:
      - Task
    post:
      consumes:
      - application/json
      description: Create a task inside a board; caller must be a board member
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: integer
      - description: Create task request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/task.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/task.TaskResponse'
        "400":
          description: bad request
          schema:
            type: string
        "403":
          description: access denied
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Add task to board
      tags:
      - Task
  /boards/{id}:
    get:
      description: Get board by ID (user must be a member)
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/board.BoardResponse'
        "403":
          description: access denied
          schema:
            type: string
        "404":
          description: board not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get board
      tags:
      - Board
  /boards/{id}/members:
    get:
      description: Returns all members of a board with their employee profile info
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/board.MemberResponse'
            type: array
        "403":
          description: access denied
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get board members
      tags:
      - Board
  /dashboard:
    get:
      description: Returns user's boards and isFirstLogin flag
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/board.DashboardResponse'
      security:
      - BearerAuth: []
      summary: Dashboard
      tags:
      - Board
  /employees:
    delete:
      responses:
        "200":
          description: deleted
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete employee
      tags:
      - Employee
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/employee.EmployeeResponse'
            type: array
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get all employees
      tags:
      - Employee
    post:
      consumes:
      - multipart/form-data
      description: Create a new employee profile. Accepts multipart/form-data so photo
        can be uploaded in the same request.
      parameters:
      - description: Profile photo (jpeg/png/gif/webp, max 5 MB)
        in: formData
        name: photo
        type: file
      - description: Full name
        in: formData
        name: full_name
        required: true
        type: string
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Gender ID
        in: formData
        name: gender_id
        required: true
        type: integer
      - description: Birthday (YYYY-MM-DD)
        in: formData
        name: birthday
        required: true
        type: string
      - description: Phone number
        in: formData
        name: phone_number
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: created
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create employee
      tags:
      - Employee
    put:
      consumes:
      - multipart/form-data
      description: Accepts multipart/form-data. Send only the fields you want to change.
      parameters:
      - description: New profile photo
        in: formData
        name: photo
        type: file
      - description: Full name
        in: formData
        name: full_name
        type: string
      - description: Email
        in: formData
        name: email
        type: string
      - description: Gender ID
        in: formData
        name: gender_id
        type: integer
      - description: Birthday (YYYY-MM-DD)
        in: formData
        name: birthday
        type: string
      - description: Phone number
        in: formData
        name: phone_number
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: updated
          schema:
            type: string
        "400":
          description: bad request
          schema:
            type: string
        "404":
          description: not found
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update employee profile
      tags:
      - Employee
  /employees/exists:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Check if employee profile exists
      tags:
      - Employee
  /employees/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/employee.EmployeeResponse'
        "404":
          description: not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get my employee profile
      tags:
      - Employee
  /invites:
    get:
      description: Returns all pending invitations for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/invite.InviteResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List my invitations
      tags:
      - Invite
  /invites/{inviteId}/accept:
    post:
      description: Accept a pending board invitation
      parameters:
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: accepted
          schema:
            type: string
        "403":
          description: access denied
          schema:
            type: string
        "404":
          description: invitation not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Accept invitation
      tags:
      - Invite
  /invites/{inviteId}/reject:
    post:
      description: Reject a pending board invitation
      parameters:
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: rejected
          schema:
            type: string
        "403":
          description: access denied
          schema:
            type: string
        "404":
          description: invitation not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Reject invitation
      tags:
      - Invite
  /tasks/{taskId}:
    get:
      description: Get task by ID; caller must be a board member
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.TaskResponse'
        "403":
          description: access denied
          schema:
            type: string
        "404":
          description: task not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get task
      tags:
      - Task
    patch:
      consumes:
      - application/json
      description: Partially update a task; caller must be a board member
      parameters:
      - description: Task ID
        in: path
        name: taskId
        required: true
        type: integer
      - description: Update task request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/task.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/task.TaskResponse'
        "400":
          description: bad request
          schema:
            type: string
        "403":
          description: access denied
          schema:
            type: string
        "404":
          description: task not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update task
      tags:
      - Task
  /upload/photo:
    post:
      consumes:
      - multipart/form-data
      description: Upload a profile photo (max 5 MB, jpeg/png/gif/webp). Returns a
        URL to use in employee fields.
      parameters:
      - description: Photo file
        in: formData
        name: photo
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: url
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: bad request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Upload photo
      tags:
      - Upload
securityDefinitions:
  BearerAuth:
    description: Enter the token with the `Bearer ` prefix, e.g. "Bearer abcde12345".
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
