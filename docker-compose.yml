services:

  db:
    image: postgres:16
    container_name: myapp_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: myapp_migrate
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://postgres:postgres@db:5432/myapp?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: myapp_app
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "7777:7777"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
